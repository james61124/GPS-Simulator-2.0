version: "3.9"

services:
  mariadb:
    image: mariadb:10-jammy
    container_name: ${MARIADB_HOSTNAME}
    restart: always
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    ports:
      - "${MARIADB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u${MARIADB_USER} -p${MARIADB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gps-net

  django:
    build:
      context: ./backend/gpsSimulator
      dockerfile: Dockerfile
    container_name: ${DJANGO_HOSTNAME}
    restart: always
    command: >
      sh -c "
      python manage.py makemigrations &&
      python manage.py migrate &&
      python manage.py createsuperuser --noinput || true &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend/gpsSimulator:/app
    ports:
      - "${DJANGO_PORT}:8000"
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gps-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${NEXT_HOSTNAME}
    restart: always
    working_dir: /app/gps-sim
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/gps-sim/node_modules
      - frontend_next:/app/gps-sim/.next
    ports:
      - "${NEXT_PORT}:3000"
    env_file:
      - .env
    depends_on:
      - django
    networks:
      - gps-net

  nginx:
    image: nginx:latest
    container_name: ${NGINX_HOSTNAME}
    restart: always
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - django
    networks:
      - gps-net

volumes:
  mariadb_data:
  frontend_node_modules:
  frontend_next:

networks:
  gps-net:
    driver: bridge